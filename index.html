<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        /* --- التصميم الاحترافي (Cyber-Glass) --- */
        body {
            background: radial-gradient(circle, #0f172a 0%, #020617 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            margin: 0;
            overflow: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 210, 255, 0.1);
            width: 350px;
            animation: fadeIn 1s ease-in;
        }

        .face-icon {
            font-size: 60px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 15px #00d2ff);
            animation: pulse 2s infinite;
        }

        h1 { font-size: 1.8rem; text-shadow: 0 0 10px rgba(255,255,255,0.3); }

        #scan-btn {
            background: transparent;
            border: 2px solid #00d2ff;
            color: #00d2ff;
            padding: 15px 40px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.3s;
            text-shadow: 0 0 8px #00d2ff;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
            margin-top: 30px;
        }

        #scan-btn:hover {
            background: #00d2ff;
            color: #020617;
            box-shadow: 0 0 30px #00d2ff;
        }

        #status {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #94a3b8;
        }

        /* --- الأنميشن --- */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-data {
            text-align: right;
            animation: fadeIn 0.5s ease-out;
        }
    </style>
</head>
<body>

    <div class="glass-card" id="main-card">
        <div class="face-icon">👤</div>
        <h1>مرحباً زياد</h1>
        <p style="opacity: 0.8;">بوابة الدخول الآمنة للبيانات</p>
        
        <button id="scan-btn" onclick="startScan()">ابدأ المسح الحيوي</button>
        
        <div id="status">بانتظار التحقق من الهوية...</div>
    </div>

    <script>
        async function startScan() {
            const btn = document.getElementById('scan-btn');
            const status = document.getElementById('status');

            // 1. فحص دعم المتصفح
            if (!window.PublicKeyCredential) {
                alert("هذا المتصفح لا يدعم الحساسات. يرجى استخدام Chrome أو Safari على موبايلك.");
                return;
            }

            try {
                btn.innerText = "جاري الفحص...";
                
                // 2. تفعيل المستشعر
                // ملاحظة: المتصفح يطلب "تحدي" من السيرفر، هنا نضع قيمة عشوائية للتجربة
                const credential = await navigator.credentials.get({
                    publicKey: {
                        challenge: new Uint8Array([1, 2, 3, 4]),
                        timeout: 60000,
                        userVerification: "required"
                    }
                });

                if (credential) {
                    showData();
                }
            } catch (err) {
                console.error(err);
                status.innerText = "فشل التحقق. تأكد من تفعيل قفل الشاشة (بصمة وجه/إصبع).";
                btn.innerText = "إعادة المحاولة";
            }
        }

        function showData() {
            const card = document.getElementById('main-card');
            card.innerHTML = `
                <div class="profile-data">
                    <h2 style="color: #00ff88; text-align:center;">✓ تم التحقق</h2>
                    <hr style="border:0; border-top:1px solid rgba(255,255,255,0.1); margin: 20px 0;">
                    <p><b>👤 الاسم:</b> زياد أحمد محمد منصور</p>
                    <p><b>🎂 العمر:</b> 22 عاماً</p>
                    <p><b>💻 التخصص:</b> مبرمج جونيور / Android</p>
                    <p><b>🔐 الصلاحية:</b> مسؤول (Admin)</p>
                    <button onclick="location.reload()" style="background:none; border:1px solid #ff4444; color:#ff4444; width:100%; border-radius:10px; padding:10px; cursor:pointer; margin-top:15px;">إغلاق الجلسة</button>
                </div>
            `;
        }
    </script>
</body>
</html>
